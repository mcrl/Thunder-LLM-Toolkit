tag:
  - ai2_arc
task: thunderllm-arc_easy
dataset_path: allenai/ai2_arc
dataset_name: ARC-Easy
output_type: multiple_choice
training_split: train
validation_split: validation
test_split: test
doc_to_text: !function preprocess_mmlu_style.doc_to_text
doc_to_target: !function preprocess_mmlu_style.doc_to_target
doc_to_choice: !function preprocess_mmlu_style.doc_to_choice
should_decontaminate: true
doc_to_decontamination_query: "Question: {{question}}\nAnswer:"
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
num_fewshot: 25
