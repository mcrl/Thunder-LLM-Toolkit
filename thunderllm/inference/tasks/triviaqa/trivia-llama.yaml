task: triviaqa-llama
dataset_path: meta-llama/Meta-Llama-3.1-8B-evals
dataset_name: Meta-Llama-3.1-8B-evals__triviaqa__wiki__details
output_type: generate_until
training_split: null
validation_split: latest
doc_to_text: "{{input_final_prompts[0]}}"
doc_to_target: "{{input_correct_responses}}"
should_decontaminate: true
doc_to_decontamination_query: question
generation_kwargs:
  until:
    - "\n"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 64
filter_list:
  - name: remove_whitespace
    filter:
      - function: remove_whitespace
      - function: take_first
target_delimiter: " "
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  version: 3.0
